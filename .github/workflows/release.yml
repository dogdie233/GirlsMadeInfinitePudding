name: Release

on:
  push:
    tags:
      - 'v*'
      - '*.*.*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g. v1.0.0)'
        required: true
        type: string

jobs:
  publish:
    name: Publish & Release (win-x64)
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Resolve tag name
        id: tag
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "name=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "name=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: Restore
        run: dotnet restore GirlsMadeInfinitePudding.slnx -r win-x64

      - name: Publish (win-x64)
        run: >
          dotnet publish Standalone/Standalone.csproj
          -c Release
          -r win-x64
          --no-restore
          -o publish/win-x64

      - name: Package zip
        shell: pwsh
        run: |
          $tag = "${{ steps.tag.outputs.name }}"
          $zip = "GirlsMadeInfinitePudding-$tag-win-x64.zip"
          Compress-Archive -Path publish/win-x64/* -DestinationPath $zip -Force
          "ASSET=$zip" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: GirlsMadeInfinitePudding-${{ steps.tag.outputs.name }}-win-x64
          path: publish/win-x64/
          if-no-files-found: error

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.name }}
          name: ${{ steps.tag.outputs.name }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            ${{ env.ASSET }}
