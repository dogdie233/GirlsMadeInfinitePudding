name: CI Build

on:
  push:
    branches: [ "**" ]
    tags-ignore: [ "**" ]
  pull_request:
    branches: [ "**" ]
  workflow_dispatch:

jobs:
  build:
    name: Build (win-x64)
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore GirlsMadeInfinitePudding.slnx

      - name: Build
        run: dotnet build GirlsMadeInfinitePudding.slnx -c Release --no-restore

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: GirlsMadeInfinitePudding-win-x64-build
          path: Standalone/bin/Release/net10.0-windows/
          if-no-files-found: error
